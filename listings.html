<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ignite - Explore Sanctuaries</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="./premium.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/supabase-client.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#131313",
                        "primary-container": "#ff6b35",
                        "secondary-container": "#ffa504",
                        "on-surface": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "surface": "#131313",
                        "primary": "#ffb59d",
                        "outline-variant": "#594139",
                        "surface-container": "#201f1f",
                        "on-surface-variant": "#e1bfb5",
                        "surface-bright": "#3a3939",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#ffcb8d",
                        "on-primary-fixed": "#390c00",
                        "surface-container-low": "#1c1b1b",
                        "surface-variant": "#353534",
                        "tertiary": "#59d5fb"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ff6b35 0%, #ffb59d 100%);
        }
        .noir-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b35;
        }
        /* Custom Checkbox Style */
        .custom-checkbox:checked {
            background-color: #ff6b35;
            border-color: #ff6b35;
        }
        .custom-checkbox:focus {
            --tw-ring-color: #ff6b35;
        }
        .mobile-menu-overlay {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: opacity 220ms ease, transform 220ms ease;
        }
        .mobile-menu-overlay.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 glass-nav transition-all duration-300">
        <div class="flex justify-between items-center px-8 h-20 w-full max-w-none">
            <div class="flex items-center gap-8">
                <a href="index.html" class="inline-flex items-center">
                    <img src="./ignite-logo.svg" alt="Ignite logo" class="h-10 w-auto"/>
                </a>
                <nav class="hidden md:flex gap-8 items-center">
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="index.html">Home</a>
                    <a class="text-[#ffb59d] border-b-2 border-[#ff6b35] pb-1 font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="listings.html">Explore</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="listings.html">Browse PG's</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="about.html">About</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="contact.html">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative hidden sm:block">
                    <input id="nav-search-listings" class="bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary-container text-sm px-6 py-2 rounded-full w-64 transition-all" placeholder="Search destinations..." type="text" autocomplete="off"/>
                    <button id="nav-search-listings-btn" class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg hover:text-primary transition-colors">search</button>
                </div>
                <a href="owner-auth.html" class="scale-95 active:scale-90 transition-transform bg-primary-container text-on-primary-fixed font-bold py-2.5 px-6 rounded-full text-sm font-headline tracking-wider uppercase inline-block text-center">
                    Sign In
                </a>
                <button id="mobile-menu-btn" class="md:hidden inline-flex items-center justify-center w-11 h-11 rounded-full border border-outline-variant/30 text-on-surface" aria-label="Open menu" aria-expanded="false">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </header>
    <div id="mobile-menu-overlay" class="mobile-menu-overlay fixed inset-0 z-40 bg-background/95 backdrop-blur-xl md:hidden">
        <div class="h-full pt-24 px-8 pb-10 flex flex-col justify-between">
            <div class="space-y-5">
                <a href="index.html" class="block text-3xl font-headline font-bold uppercase">Home</a>
                <a href="listings.html" class="block text-3xl font-headline font-bold uppercase">Explore</a>
                <a href="about.html" class="block text-3xl font-headline font-bold uppercase">About</a>
                <a href="contact.html" class="block text-3xl font-headline font-bold uppercase">Contact</a>
                <a href="owner-auth.html" class="block text-3xl font-headline font-bold uppercase text-primary">Host</a>
            </div>
            <button id="mobile-menu-close" class="w-full border border-outline-variant/30 rounded-full py-3 uppercase text-sm tracking-widest">Close Menu</button>
        </div>
    </div>

    <main class="pt-32 pb-32 px-8 md:px-20 min-h-screen bg-surface">
        
        <!-- Header -->
        <div class="mb-10 border-b border-outline-variant/10 pb-6">
            <!-- Page Title -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-6">
                <div>
                    <p class="text-primary font-label tracking-widest uppercase text-xs mb-2">Explore</p>
                    <h1 class="text-4xl md:text-5xl font-headline font-bold uppercase tracking-tight">Available Sanctuaries</h1>
                </div>
                <p class="text-on-surface-variant text-sm font-label uppercase tracking-widest whitespace-nowrap" id="result-count">Loading...</p>
            </div>
            <!-- Search Bar -->
            <div class="relative max-w-2xl">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary text-xl pointer-events-none">location_on</span>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search by city, area or hostel name…"
                    class="w-full bg-surface-container-low border border-outline-variant/30 focus:border-primary-container/60 focus:ring-2 focus:ring-primary-container/20 focus:outline-none text-sm pl-14 pr-14 py-4 rounded-2xl transition-all font-body text-on-surface placeholder:text-on-surface-variant/50"
                    autocomplete="off"
                />
                <button id="search-clear" class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors hidden">
                    <span class="material-symbols-outlined text-xl">close</span>
                </button>
            </div>
            <!-- Quick Tags -->
            <div class="flex flex-wrap gap-2 mt-4" id="quick-tags">
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="hyderabad">Hyderabad</button>
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="bangalore">Bangalore</button>
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="mumbai">Mumbai</button>
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="delhi">Delhi</button>
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="pune">Pune</button>
                <button class="quick-tag px-4 py-1.5 rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/30 text-on-surface-variant hover:border-primary-container hover:text-primary transition-all" data-tag="chennai">Chennai</button>
            </div>
        </div>

        <div class="grid grid-cols-1">
            <!-- Listings Grid -->
            <div class="col-span-1">
                <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-8">
                    <!-- Dynamic Listings will be injected here via JavaScript -->
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Shell -->
    <footer class="bg-[#131313] w-full border-t border-[#594139]/15 footer-glow">
        <div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full">
            <div class="mb-10 md:mb-0">
                <img src="./ignite-logo.svg" alt="Ignite logo" class="h-10 w-auto"/>
                <p class="text-[#e5e2e1]/40 text-[0.6rem] mt-2 font-label tracking-widest uppercase">To the Future.</p>
            </div>
            <nav class="flex flex-wrap justify-center gap-12 mb-10 md:mb-0">
                <a class="text-[#ffb59d] font-bold font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="listings.html">Explore</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="owner-auth.html">Host</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="terms.html">Terms</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="about.html">About</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="contact.html">Contact</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="contact.html">Support</a>
            </nav>
            <div class="text-[#e5e2e1]/40 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase text-center md:text-right">
                © 2026 IGNITE HOSTEL MARKETPLACE. <br class="hidden md:block"/> ALL RIGHTS RESERVED.
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileOverlay = document.getElementById('mobile-menu-overlay');
            const mobileClose = document.getElementById('mobile-menu-close');

            const setMenuOpen = (open) => {
                if (!mobileOverlay || !mobileBtn) return;
                mobileOverlay.classList.toggle('is-open', open);
                mobileBtn.setAttribute('aria-expanded', String(open));
                document.body.style.overflow = open ? 'hidden' : '';
            };

            if (mobileBtn && mobileOverlay) {
                mobileBtn.addEventListener('click', () => setMenuOpen(!mobileOverlay.classList.contains('is-open')));
            }
            if (mobileClose) {
                mobileClose.addEventListener('click', () => setMenuOpen(false));
            }
            if (mobileOverlay) {
                mobileOverlay.querySelectorAll('a').forEach((link) => {
                    link.addEventListener('click', () => setMenuOpen(false));
                });
            }

            // --- Navbar search on listings page: sync with main search input ---
            const navSearchListings    = document.getElementById('nav-search-listings');
            const navSearchListingsBtn = document.getElementById('nav-search-listings-btn');
            function syncNavSearch(val) {
                const mainInput = document.getElementById('search-input');
                const clearBtn  = document.getElementById('search-clear');
                if (mainInput) {
                    mainInput.value = val;
                    mainInput.dispatchEvent(new Event('input', { bubbles: true }));
                }
                if (clearBtn) clearBtn.classList.toggle('hidden', !val.trim());
            }
            if (navSearchListings) {
                navSearchListings.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); syncNavSearch(this.value); }
                });
            }
            if (navSearchListingsBtn) {
                navSearchListingsBtn.addEventListener('click', function() {
                    syncNavSearch(navSearchListings ? navSearchListings.value : '');
                });
            }

            const grid = document.getElementById('listings-grid');
            const searchInput = document.getElementById('search-input');
            const searchClear = document.getElementById('search-clear');
            const resultCount = document.getElementById('result-count');
            if (!grid || !window.supabaseClient) return;

            // --- Read URL search param ---
            const urlParams = new URLSearchParams(window.location.search);
            const urlQuery = urlParams.get('q') || '';
            if (urlQuery && searchInput) {
                searchInput.value = urlQuery;
                searchClear.classList.remove('hidden');
            }

            // --- Skeleton loaders while fetching ---
            grid.innerHTML = `
                <div class="group"><div class="skeleton aspect-[4/5] rounded-[0.75rem] mb-6"></div><div class="px-2"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text medium"></div></div></div>
                <div class="group"><div class="skeleton aspect-[4/5] rounded-[0.75rem] mb-6"></div><div class="px-2"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text medium"></div></div></div>
                <div class="group hidden sm:block"><div class="skeleton aspect-[4/5] rounded-[0.75rem] mb-6"></div><div class="px-2"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text medium"></div></div></div>
                <div class="group hidden xl:block"><div class="skeleton aspect-[4/5] rounded-[0.75rem] mb-6"></div><div class="px-2"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text medium"></div></div></div>
            `;

            // --- Fetch ALL hostels once ---
            const { data: allHostels, error } = await window.supabaseClient
                .from('hostels')
                .select('*')
                .order('created_at', { ascending: false });
                
            if (error) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-400 font-bold">Error loading listings: ${error.message}</div>`;
                if (resultCount) resultCount.textContent = 'Error';
                return;
            }

            const planOrder = { 'enterprise': 0, 'pro': 1, 'starter': 2 };
            const hostels = (allHostels || []).sort((a, b) => {
                const pa = planOrder[a.plan] ?? 2;
                const pb = planOrder[b.plan] ?? 2;
                if (pa !== pb) return pa - pb;
                return new Date(b.created_at) - new Date(a.created_at);
            });

            // --- Fallback images pool ---
            const fallbackImages = [
                'https://images.unsplash.com/photo-1555854877-bab0e564b8d5?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1502672260266-1c1c2940e4f4?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1560472354-b33ff0c44a43?q=80&w=800&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=800&auto=format&fit=crop'
            ];

            // --- Build a hostel card HTML string ---
            function buildCard(h, i) {
                let imagesArr = [];
                try {
                    imagesArr = typeof h.images === 'string' ? JSON.parse(h.images) : (h.images || []);
                    if (!Array.isArray(imagesArr)) imagesArr = [];
                } catch(e) { imagesArr = []; }
                const rawImage = imagesArr.length > 0 ? imagesArr[0] : '';
                const img = (typeof rawImage === 'string' && rawImage.startsWith('http'))
                    ? rawImage : fallbackImages[i % fallbackImages.length];

                let parsedAmenities = [];
                try {
                    parsedAmenities = typeof h.amenities === 'string' ? JSON.parse(h.amenities) : (h.amenities || []);
                    if (!Array.isArray(parsedAmenities)) parsedAmenities = [];
                } catch(e) { parsedAmenities = []; }

                // --- Plan-based extras ---
                const isVerified = h.plan === 'pro' || h.plan === 'enterprise';
                const isEnterprise = h.plan === 'enterprise';
                const hasWhatsApp = isVerified && h.contact_whatsapp;
                const glowClass = isEnterprise ? 'ring-2 ring-[#ff6b35]/30 shadow-[0_0_30px_rgba(255,107,53,0.12)]' : '';
                const verifiedBadge = isVerified ? `<span class="bg-[#ff6b35] text-white text-[0.5rem] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:10px;font-variation-settings:'FILL' 1">verified</span> Verified</span>` : '';
                const waButton = hasWhatsApp ? `<a href="https://wa.me/${h.contact_whatsapp.replace(/\D/g,'')}" target="_blank" onclick="event.stopPropagation()" class="mt-3 flex items-center gap-2 text-[0.6rem] font-bold uppercase tracking-widest text-[#25D366] hover:text-[#1aad57] transition-colors"><span class="material-symbols-outlined text-[14px]">chat</span> WhatsApp</a>` : '';

                return `
                <a href="hostel-detail.html?id=${h.id}" class="group cursor-pointer block cursor-glow premium-hover rounded-[0.75rem] ${glowClass}" data-reveal data-reveal-delay="${(i % 4) + 1}">
                    <div class="relative overflow-hidden rounded-[0.75rem] aspect-[4/5] mb-6 bg-[#1A1A1A]">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 group-hover:rotate-1" src="${img}" onerror="this.onerror=null;this.src='./ignite-placeholder.svg';"/>
                        <div class="absolute top-4 left-4 flex gap-2 flex-wrap">
                            <span class="bg-surface/80 noir-blur text-on-surface border border-outline-variant/20 text-[0.6rem] px-3 py-1 rounded-full font-bold uppercase tracking-widest capitalize">${h.type || 'Co-ed'}</span>
                            ${verifiedBadge}
                        </div>
                        <div class="absolute top-4 right-4 bg-background/80 noir-blur px-4 py-2 rounded-full border border-outline-variant/20">
                            <span class="text-secondary font-bold text-sm">₹${h.price_per_month}</span>
                            <span class="text-on-surface-variant text-[0.6rem] uppercase tracking-tighter">/ mo</span>
                        </div>
                    </div>
                    <div class="px-2">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-lg font-headline font-bold uppercase truncate">${h.name}</h4>
                        </div>
                        <p class="text-on-surface-variant text-sm mb-4 truncate text-ellipsis capitalize">${(h.address || '').split(',')[0]} • ${h.city}</p>
                        <div class="flex flex-wrap gap-2">
                            ${parsedAmenities.slice(0,3).map(a => `<span class="text-[0.6rem] border border-outline-variant/30 px-3 py-1 rounded-full uppercase text-on-surface-variant">${a}</span>`).join('')}
                        </div>
                        ${waButton}
                    </div>
                </a>`;
            }

            // --- Render filtered results ---
            function renderHostels(filtered) {
                if (resultCount) {
                    resultCount.textContent = filtered.length === hostels.length
                        ? `${filtered.length} Sanctuaries`
                        : `${filtered.length} of ${hostels.length} Results`;
                }
                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-24 text-center">
                            <span class="material-symbols-outlined text-5xl text-on-surface-variant/30 mb-4 block">search_off</span>
                            <p class="text-on-surface-variant font-bold tracking-widest uppercase text-sm">No sanctuaries found for this area.</p>
                            <p class="text-on-surface-variant/50 text-xs mt-2">Try a different city or area name.</p>
                        </div>`;
                    return;
                }
                grid.innerHTML = filtered.map((h, i) => buildCard(h, i)).join('');
                requestAnimationFrame(function() {
                    if (window.premiumObserve) window.premiumObserve(grid);
                });
            }

            // --- Filter logic ---
            function filterHostels(query) {
                const q = query.trim().toLowerCase();
                if (!q) return hostels;
                
                // Split search into individual words for smarter matching (e.g. "mangalpally hyderabad")
                const searchTerms = q.split(/\s+/);
                
                return hostels.filter(h => {
                    // Combine all searchable fields into one giant string
                    const fullText = [
                        h.name || '',
                        h.city || '',
                        h.address || '',
                        h.area || '',
                        h.type || ''
                    ].join(' ').toLowerCase();
                    
                    // The hostel matches if EVERY entered word is found somewhere in its details
                    return searchTerms.every(term => fullText.includes(term));
                });
            }

            // --- Initial render (with URL query if present) ---
            renderHostels(filterHostels(urlQuery));

            // --- Wire search input ---
            if (searchInput) {
                let debounceTimer;
                searchInput.addEventListener('input', function() {
                    const val = this.value;
                    searchClear.classList.toggle('hidden', !val.trim());
                    // Update quick-tag active state
                    document.querySelectorAll('.quick-tag').forEach(t => {
                        t.classList.toggle('border-primary-container', t.dataset.tag === val.trim().toLowerCase());
                        t.classList.toggle('text-primary', t.dataset.tag === val.trim().toLowerCase());
                    });
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => renderHostels(filterHostels(val)), 220);
                });
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); renderHostels(filterHostels(this.value)); }
                });
            }

            // --- Clear button ---
            if (searchClear) {
                searchClear.addEventListener('click', function() {
                    searchInput.value = '';
                    this.classList.add('hidden');
                    document.querySelectorAll('.quick-tag').forEach(t => {
                        t.classList.remove('border-primary-container', 'text-primary');
                    });
                    renderHostels(hostels);
                });
            }

            // --- Quick tag buttons ---
            document.querySelectorAll('.quick-tag').forEach(function(btn) {
                // Highlight if matches current query
                if (urlQuery && btn.dataset.tag === urlQuery.trim().toLowerCase()) {
                    btn.classList.add('border-primary-container', 'text-primary');
                }
                btn.addEventListener('click', function() {
                    const tag = this.dataset.tag;
                    searchInput.value = tag;
                    searchClear.classList.remove('hidden');
                    document.querySelectorAll('.quick-tag').forEach(t => {
                        t.classList.toggle('border-primary-container', t === btn);
                        t.classList.toggle('text-primary', t === btn);
                    });
                    renderHostels(filterHostels(tag));
                });
            });

        });

    </script>
    <script src="./js/premium.js"></script>
</body>
</html>
