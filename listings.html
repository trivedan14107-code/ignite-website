<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ignite - Explore Sanctuaries</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/supabase-client.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#131313",
                        "primary-container": "#ff6b35",
                        "secondary-container": "#ffa504",
                        "on-surface": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "surface": "#131313",
                        "primary": "#ffb59d",
                        "outline-variant": "#594139",
                        "surface-container": "#201f1f",
                        "on-surface-variant": "#e1bfb5",
                        "surface-bright": "#3a3939",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#ffcb8d",
                        "on-primary-fixed": "#390c00",
                        "surface-container-low": "#1c1b1b",
                        "surface-variant": "#353534",
                        "tertiary": "#59d5fb"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ff6b35 0%, #ffb59d 100%);
        }
        .noir-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b35;
        }
        /* Custom Checkbox Style */
        .custom-checkbox:checked {
            background-color: #ff6b35;
            border-color: #ff6b35;
        }
        .custom-checkbox:focus {
            --tw-ring-color: #ff6b35;
        }
        .mobile-menu-overlay {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: opacity 220ms ease, transform 220ms ease;
        }
        .mobile-menu-overlay.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-md shadow-[0_20px_40px_rgba(0,0,0,0.4)] transition-all duration-300">
        <div class="flex justify-between items-center px-8 h-20 w-full max-w-none">
            <div class="flex items-center gap-8">
                <a href="index.html" class="inline-flex items-center">
                    <img src="./ignite-logo.svg" alt="Ignite logo" class="h-10 w-auto"/>
                </a>
                <nav class="hidden md:flex gap-8 items-center">
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="index.html">Home</a>
                    <a class="text-[#ffb59d] border-b-2 border-[#ff6b35] pb-1 font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="listings.html">Explore</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="listings.html">Browse PG's</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="about.html">About</a>
                    <a class="text-[#e5e2e1] opacity-70 hover:text-[#ffb59d] transition-all duration-200 ease-out font-['Space_Grotesk'] font-bold tracking-[0.05em] uppercase text-sm" href="contact.html">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative hidden sm:block">
                    <input class="bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary-container text-sm px-6 py-2 rounded-full w-64 transition-all" placeholder="Search destinations..." type="text"/>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
                </div>
                <a href="owner-auth.html" class="scale-95 active:scale-90 transition-transform bg-primary-container text-on-primary-fixed font-bold py-2.5 px-6 rounded-full text-sm font-headline tracking-wider uppercase inline-block text-center">
                    Sign In
                </a>
                <button id="mobile-menu-btn" class="md:hidden inline-flex items-center justify-center w-11 h-11 rounded-full border border-outline-variant/30 text-on-surface" aria-label="Open menu" aria-expanded="false">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </header>
    <div id="mobile-menu-overlay" class="mobile-menu-overlay fixed inset-0 z-40 bg-background/95 backdrop-blur-xl md:hidden">
        <div class="h-full pt-24 px-8 pb-10 flex flex-col justify-between">
            <div class="space-y-5">
                <a href="index.html" class="block text-3xl font-headline font-bold uppercase">Home</a>
                <a href="listings.html" class="block text-3xl font-headline font-bold uppercase">Explore</a>
                <a href="about.html" class="block text-3xl font-headline font-bold uppercase">About</a>
                <a href="contact.html" class="block text-3xl font-headline font-bold uppercase">Contact</a>
                <a href="owner-auth.html" class="block text-3xl font-headline font-bold uppercase text-primary">Host</a>
            </div>
            <button id="mobile-menu-close" class="w-full border border-outline-variant/30 rounded-full py-3 uppercase text-sm tracking-widest">Close Menu</button>
        </div>
    </div>

    <main class="pt-32 pb-32 px-8 md:px-20 min-h-screen bg-surface">
        
        <!-- Header -->
        <div class="mb-10 flex flex-col md:flex-row justify-between items-end gap-4 border-b border-outline-variant/10 pb-6">
            <div>
                <p class="text-primary font-label tracking-widest uppercase text-xs mb-2">Explore</p>
                <h1 class="text-4xl md:text-5xl font-headline font-bold uppercase tracking-tight">Available Sanctuaries</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative md:hidden w-full">
                    <input class="bg-surface-container-lowest w-full border-none focus:ring-2 focus:ring-primary-container text-sm px-6 py-3 rounded-full transition-all" placeholder="Search..." type="text"/>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
                </div>
                <p class="text-on-surface-variant text-sm font-label uppercase tracking-widest whitespace-nowrap hidden md:block">Showing 24 Results</p>
            </div>
        </div>

        <div class="grid grid-cols-1">
            <!-- Listings Grid -->
            <div class="col-span-1">
                <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-8">
                    <!-- Dynamic Listings will be injected here via JavaScript -->
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Shell -->
    <footer class="bg-[#131313] w-full border-t border-[#594139]/15">
        <div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full">
            <div class="mb-10 md:mb-0">
                <img src="./ignite-logo.svg" alt="Ignite logo" class="h-10 w-auto"/>
                <p class="text-[#e5e2e1]/40 text-[0.6rem] mt-2 font-label tracking-widest uppercase">To the Future.</p>
            </div>
            <nav class="flex flex-wrap justify-center gap-12 mb-10 md:mb-0">
                <a class="text-[#ffb59d] font-bold font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="listings.html">Explore</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="owner-auth.html">Host</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="terms.html">Terms</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="about.html">About</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="contact.html">Contact</a>
                <a class="text-[#e5e2e1]/60 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase hover:text-[#ffb59d] transition-colors" href="contact.html">Support</a>
            </nav>
            <div class="text-[#e5e2e1]/40 font-['Manrope'] text-[0.6875rem] tracking-[0.1em] uppercase text-center md:text-right">
                © 2026 IGNITE HOSTEL MARKETPLACE. <br class="hidden md:block"/> ALL RIGHTS RESERVED.
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileOverlay = document.getElementById('mobile-menu-overlay');
            const mobileClose = document.getElementById('mobile-menu-close');

            const setMenuOpen = (open) => {
                if (!mobileOverlay || !mobileBtn) return;
                mobileOverlay.classList.toggle('is-open', open);
                mobileBtn.setAttribute('aria-expanded', String(open));
                document.body.style.overflow = open ? 'hidden' : '';
            };

            if (mobileBtn && mobileOverlay) {
                mobileBtn.addEventListener('click', () => setMenuOpen(!mobileOverlay.classList.contains('is-open')));
            }
            if (mobileClose) {
                mobileClose.addEventListener('click', () => setMenuOpen(false));
            }
            if (mobileOverlay) {
                mobileOverlay.querySelectorAll('a').forEach((link) => {
                    link.addEventListener('click', () => setMenuOpen(false));
                });
            }

            const grid = document.getElementById('listings-grid');
            if(!grid || !window.supabaseClient) return;
            
            grid.innerHTML = '<div class="col-span-full py-20 text-center"><p class="text-on-surface-variant font-bold tracking-widest uppercase text-sm">Loading Sanctuaries...</p></div>';
            
            const { data: hostels, error } = await window.supabaseClient
                .from('hostels')
                .select('*')
                .order('created_at', { ascending: false });
                
            if (error) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-error font-bold">Error loading listings: ${error.message}</div>`;
                return;
            }
            
            if(!hostels || hostels.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-on-surface-variant font-bold tracking-widest uppercase text-sm">No sanctuaries available at the moment. Check back soon!</div>';
                return;
            }
            
            grid.innerHTML = hostels.map(h => {
                const fallbackImage = './ignite-placeholder.svg';
                const rawImage = (h.images && h.images.length > 0) ? h.images[0] : '';
                const img = (typeof rawImage === 'string' && rawImage.trim().length > 0)
                    ? rawImage
                    : fallbackImage;
                const parsedAmenities = Array.isArray(h.amenities) ? h.amenities : [];
                
                return `
                <a href="hostel-detail.html?id=${h.id}" class="group cursor-pointer block">
                    <div class="relative overflow-hidden rounded-[0.75rem] aspect-[4/5] mb-6 bg-[#1A1A1A]">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 group-hover:rotate-1" src="${img}" onerror="this.onerror=null;this.src='./ignite-placeholder.svg';"/>
                        <div class="absolute top-4 left-4 flex gap-2">
                            <span class="bg-surface/80 noir-blur text-on-surface border border-outline-variant/20 text-[0.6rem] px-3 py-1 rounded-full font-bold uppercase tracking-widest capitalize">${h.type || 'Co-ed'}</span>
                        </div>
                        <div class="absolute top-4 right-4 bg-background/80 noir-blur px-4 py-2 rounded-full border border-outline-variant/20">
                            <span class="text-secondary font-bold text-sm">₹${h.price_per_month}</span>
                            <span class="text-on-surface-variant text-[0.6rem] uppercase tracking-tighter">/ mo</span>
                        </div>
                    </div>
                    <div class="px-2">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-lg font-headline font-bold uppercase truncate">${h.name}</h4>
                        </div>
                        <p class="text-on-surface-variant text-sm mb-4 truncate text-ellipsis capitalize">${(h.address || '').split(',')[0]} • ${h.city}</p>
                        <div class="flex flex-wrap gap-2">
                            ${parsedAmenities.slice(0,3).map(a => `<span class="text-[0.6rem] border border-outline-variant/30 px-3 py-1 rounded-full uppercase text-on-surface-variant">${a}</span>`).join('')}
                        </div>
                    </div>
                </a>`;
            }).join('');
        });
    </script>
</body>
</html>
